<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Resource Consolidated | Lefi Abdelmonem</title>
  
  <!-- SEO & Canonical Tags -->
  <link rel="canonical" href="https://lefi-abdelmonem.com/">
  <meta name="robots" content="noindex, follow">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background-color: var(--bg-primary);
      text-align: center;
    }
    
    .error-wrapper {
      width: 100%;
      max-width: 600px;
      position: relative;
      z-index: 1;
    }
    
    .error-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 0, 122, 0.05);
      padding: 50px 40px;
      border-radius: var(--border-radius-lg);
    }
    
    .error-code {
      font-family: var(--font-title);
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent-ai), var(--accent-dev));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      letter-spacing: -0.05em;
    }
    
    .error-title {
      font-family: var(--font-title);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    
    .error-message {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    
    .countdown-bar-container {
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 32px;
    }
    
    .countdown-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--accent-ai), var(--accent-dev));
      animation: countdown 5s linear forwards;
    }
    
    @keyframes countdown {
      0% { width: 100%; }
      100% { width: 0%; }
    }
    
    .countdown-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: var(--font-title);
    }
  </style>
</head>
<body>

  <!-- Background Ambient Glows -->
  <div class="ambient-glows">
    <div class="glow-orb orb-1" style="background: var(--accent-ai); top: 10%; right: -10%; width: 400px; height: 400px;"></div>
    <div class="glow-orb orb-2" style="background: var(--accent-dev); bottom: 10%; left: -10%; width: 400px; height: 400px;"></div>
  </div>

  <div class="error-wrapper">
    <div class="glass-card error-card">
      <div class="error-code">404</div>
      <h1 class="error-title">🛡️ Resource Consolidated</h1>
      <p class="error-message">
        The legacy WordPress resource you are looking for has been upgraded, secured, and consolidated into our high-performance root portfolio.
      </p>
      
      <div class="countdown-text">
        Rerouting to main terminal in <span id="countdownTimer">5</span>s...
      </div>
      
      <div class="countdown-bar-container">
        <div class="countdown-bar"></div>
      </div>
      
      <a href="/" class="btn-primary" style="justify-content: center;">
        Go to Main Terminal &rarr;
      </a>
    </div>
  </div>

  <!-- Intelligent Client-Side Router for WordPress Migrations -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const pathname = window.location.pathname.toLowerCase();
      
      // Detailed slug mappings to maintain search equity
      const mappings = {
        'portfolio': '/#experience',
        'optimisation-wordpress-aeo-agents-ia-autonomes': '/#news',
        'maintenance-ia-cms-auto-reparateur-seo': '/#news',
        'wordpress-securite-ia-bots-polymorphes-immunite-numerique': '/#news',
        'ia-locale-wordpress-prestashop-inference-serveur': '/#news',
        'seo-zero-clic-strategie-autorite-ia': '/#news',
        'eco-seo-empreinte-carbone-serveur-algorithme-google': '/#news',
        'securite-wordpress-cryptographie-post-quantique-nist': '/#news',
        'seo-webxr-prestashop-indexation-spatiale': '/#news',
        'seo-wordpress-indexation-multi-modale-ia': '/#news',
        'google-gemini-3-release': '/#news',
        'google-nano-banana-pro-ai': '/#news',
        'seo-identite-wordpress-protection-ia': '/#news',
        'passeport-numerique-produit-seo-prestashop': '/#news',
        'seo-predictif-prestashop-anthropic-claude-6': '/#news',
        'sxo-the-future-of-seo': '/#news',
        'medusa-js-self-hosted': '/#services',
        'medusajs-self-hosted': '/#services',
        'seo-en-2026-comment-lia-revolutionne-prestashop': '/#news',
        'zero-party-data-prestashop': '/#news',
        'maintenance-wordpress-ia': '/#news',
        'prestashop-webassembly-seo': '/#news',
        'wordpress-multilingue-natif': '/#news',
        'knowledge-graph-enhanced-llms': '/#news',
        'contrastive-learning-ai': '/#news'
      };

      let targetUrl = '/';
      let isKnownSlug = false;

      // Check explicit slug matches
      for (const [slug, newPath] of Object.entries(mappings)) {
        if (pathname.includes(slug)) {
          targetUrl = newPath;
          isKnownSlug = true;
          break;
        }
      }

      // Context-aware fallback routing
      if (!isKnownSlug) {
        if (pathname.includes('prestashop')) {
          targetUrl = '/#services';
          isKnownSlug = true;
        } else if (pathname.includes('wordpress')) {
          targetUrl = '/#services';
          isKnownSlug = true;
        } else if (pathname.includes('seo') || pathname.includes('sxo')) {
          targetUrl = '/#seo-tool';
          isKnownSlug = true;
        } else if (pathname.includes('security') || pathname.includes('securite')) {
          targetUrl = '/#services';
          isKnownSlug = true;
        }
      }

      // If it is a known slug, redirect immediately to prevent poor UX
      if (isKnownSlug) {
        window.location.replace(targetUrl);
        return;
      }

      // Otherwise, apply countdown & redirect to home after 5s for unknown 404s
      let count = 5;
      const timerEl = document.getElementById('countdownTimer');
      
      const interval = setInterval(() => {
        count--;
        if (timerEl) timerEl.textContent = count;
        
        if (count <= 0) {
          clearInterval(interval);
          window.location.replace(targetUrl);
        }
      }, 1000);

      // Bind manual CTA override
      const ctaBtn = document.querySelector('.btn-primary');
      if (ctaBtn) {
        ctaBtn.setAttribute('href', targetUrl);
      }
    });
  </script>
</body>
</html>
