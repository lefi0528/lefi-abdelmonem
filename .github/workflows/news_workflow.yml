name: Daily Tech News AI Veille

on:
  schedule:
    # Run every 24 hours at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual execution in GitHub UI

# ✅ Permission nécessaire pour que github-actions[bot] puisse push
permissions:
  contents: write

jobs:
  run-veille:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # ✅ Token explicite pour que git push s'authentifie correctement
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Run Daily Tech News IA Aggregator
      env:
        # Add your free Gemini API key to GitHub Secrets named GEMINI_API_KEY
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node cron/fetch_news.js

    - name: Commit & Push dynamic news changes
      run: |
        git config --global user.name "Lefi AI Agent"
        git config --global user.email "agent@lefi-abdelmonem.com"
        git add news.json
        # Only commit and push if news.json has changed to prevent empty commits
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [Veille IA] Actualisation automatique des news du jour (24h)" && git push)
